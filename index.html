<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Alumini Connect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <div class="grid-spot one"></div>
    <div class="grid-spot two"></div>

    <main class="login-card" aria-label="Admin login panel">
      <section class="login-header">
        <h1 class="login-title">Admin Access</h1>
        <p class="login-subtitle">Secure sign-in for the Alumini Connect control center.</p>
      </section>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="admin-username">Admin Username</label>
          <input
            id="admin-username"
            name="admin-username"
            type="text"
            autocomplete="username"
            placeholder="Enter your username"
            aria-required="true"
          />
        </div>

        <div class="form-group">
          <label for="admin-password">Password</label>
          <input
            id="admin-password"
            name="admin-password"
            type="password"
            autocomplete="current-password"
            placeholder="Enter your password"
            aria-required="true"
          />
          <button type="button" id="toggle-password" class="password-toggle" aria-label="Show password">Show</button>
        </div>

        <div class="inline-row">
          <label class="checkbox-group">
            <input type="checkbox" id="remember-me" name="remember-me" />
            <span>Remember me</span>
          </label>
          <a href="#" class="helper-link" aria-label="Forgot password">Forgot password?</a>
        </div>

        <div class="login-action">
          <button type="submit" id="login-button" class="login-button" aria-live="polite">
            Login
            <span class="spinner" aria-hidden="true">
              <svg viewBox="0 0 50 50" fill="none" stroke="currentColor" stroke-width="4">
                <circle cx="25" cy="25" r="18" stroke-opacity="0.25"></circle>
                <path d="M43 25c0-9.665-7.835-17.5-17.5-17.5"/>
              </svg>
            </span>
          </button>
        </div>

        <div id="message-bar" class="message-bar" role="status" aria-live="assertive"></div>
      </form>

      <p class="footer-note">This UI is built with secure client-side validation and modern access controls.</p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
